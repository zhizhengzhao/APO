# Default config snapshot — kept in sync with arch_policy.config dataclasses.
# Override via CLI flags on the runner scripts.
#
# Design:
#   - 8 roles (Planner / Decomposer / Solver / Critic / Verifier / Refiner /
#     Researcher / Tester) — every role is defined by responsibility, not by
#     means. Any role can call any tool (python_exec / sympy_check / web_search).
#   - sequence = priority score per slot (Plackett-Luce, length = #active)
#   - dynamic stopping via Synth (no fixed cycle cap exposed to head)
#   - DeepSeek API as worker (head is the only thing trained)
#   - Naming: episode > cycle > turn > step

architecture:
  n_max: 6
  k_roles: 8
  d_latent: 32
  role_names: [Planner, Decomposer, Solver, Critic, Verifier, Refiner, Researcher, Tester]
  # Engineering safety caps (NOT learned). Reward cost terms teach the system
  # to stop early; these just prevent runaway loops if Synth is misbehaving.
  safety_max_cycles: 20
  safety_max_steps: 8
  safety_max_tokens_per_call: 2048

models:
  head: "Qwen/Qwen3-4B"
  head_dtype: bfloat16
  # Trainability mode (set via CLI flags on 03_run_sft.py):
  #   default (full FT)         : freeze_backbone=False, lora_rank=0
  #   recommended for 9B+ on a single 80GB card: lora_rank=32 (PEFT LoRA on q/k/v/o + MLP)
  #   head-only baseline (V3)   : freeze_backbone=True
  worker_model: "deepseek-chat"          # OpenAI-compatible API
  worker_base_url: "https://api.deepseek.com/v1"

train:
  sft:
    epochs: 5                # one ckpt per epoch is always saved
    lr: 1.0e-5               # conservative for full FT 9B; raise to 1e-4 for LoRA
    batch_size: 8
    grad_accum: 2
    save_every_n_steps: 200  # extra mid-epoch ckpts (per-epoch is always written)
    label_smoothing: 0.05    # 0/1 → 0.05/0.95 for Bernoulli; analogous for Cat
    # Per-typed loss weights
    w_gate: 1.0
    w_role: 1.0
    w_edge: 1.0
    w_seq: 1.0               # PL is NOT smoothed (listwise rank already diverse)
  grpo:
    group_size: 4
    lr: 1.0e-5
    batch_size: 4
    entropy_weight: 0.01     # NO KL term (head is fresh policy planner)
  tokenizer_max_len: 512     # both SFT and GRPO truncate task texts here
  reward:
    lambda_agent: 0.03
    lambda_edge: 0.005
    lambda_call: 0.01
    lambda_token: 0.0        # off by default; enable for token-cost ablation
